name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  MONGO_URL: mongodb://localhost:27017
  DB_NAME: anime_world_ci
  JWT_SECRET: ci-test-secret-not-for-production
  ENVIRONMENT: test
  LOG_LEVEL: WARNING

jobs:
  # ---------------------------------------------------------------------------
  # Lint & type-check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Install project dependencies
        run: pip install -r backend/requirements.txt

      - name: Run black (format check)
        run: black --check backend/ tests/
        continue-on-error: true

      - name: Run isort (import order check)
        run: isort --check-only backend/ tests/
        continue-on-error: true

      - name: Run flake8 (style check)
        run: |
          flake8 backend/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503,E501 \
            --exclude=__pycache__,.venv
        continue-on-error: true

      - name: Run mypy (type check)
        run: mypy backend/ --ignore-missing-imports
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Unit & integration tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run existing backend tests
        run: |
          pytest backend/tests/ -v --tb=short
        env:
          EXPO_PUBLIC_BACKEND_URL: http://localhost:8001
        continue-on-error: true

      - name: Run new unit/integration tests
        run: |
          pytest tests/ -v --tb=short \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not slow"
        env:
          MONGO_URL: ${{ env.MONGO_URL }}
          DB_NAME: ${{ env.DB_NAME }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          LOG_LEVEL: ${{ env.LOG_LEVEL }}

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Docker build validation
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: anime-world-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Security scan
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: |
          bandit -r backend/ \
            --exclude backend/tests \
            -ll \
            --format json \
            -o bandit-report.json || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
