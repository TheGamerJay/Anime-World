[pytest]
# Test discovery
testpaths = tests backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async mode (pytest-asyncio)
asyncio_mode = auto

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header

# Custom markers
markers =
    unit: Pure unit tests (no I/O)
    integration: Tests that require a running database
    slow: Tests that take more than 1 second
    auth: Authentication-related tests
    series: Series endpoint tests
    episodes: Episode endpoint tests

# Coverage (when run with --cov)
# pytest --cov=backend --cov-report=html --cov-report=term-missing

# Warnings
filterwarnings =
    ignore::DeprecationWarning:motor.*
    ignore::DeprecationWarning:pymongo.*
