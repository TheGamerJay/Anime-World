version: "3.9"

# =============================================================================
# Local development stack
#
# Usage:
#   docker compose up          # Start all services
#   docker compose up --build  # Rebuild images
#   docker compose down -v     # Stop and remove volumes
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MongoDB
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: anime_world_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: anime_world
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: anime_world_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: anime_world
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-false}
      PORT: 8001
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      # Mount backend source for hot-reload in development
      - ./backend:/app/backend:ro
      # Persist uploaded files
      - uploads_data:/app/backend/uploads
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: >
      uvicorn backend.server:app
        --host 0.0.0.0
        --port 8001
        --reload
        --reload-dir /app/backend

  # ---------------------------------------------------------------------------
  # Mongo Express (optional DB admin UI)
  # ---------------------------------------------------------------------------
  mongo-express:
    image: mongo-express:1.0.2
    container_name: anime_world_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy
    profiles:
      - tools  # Only start with: docker compose --profile tools up

volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local
